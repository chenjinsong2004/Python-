{% extends "layout.html" %}

{% block content %}
<div style="margin-bottom: 10px;" class="clearfix">
  <!-- 在新页面打开 target="_blank" -->
  <div style="float: left">
    <a class="btn btn-primary" href="/pretty/add" style="margin-bottom:10px" target="_blank">
      新建靓号
    </a>
  </div>
  <form method="get">
    <div class="input-group" style="float: right;width: 300px;">

      <input type="text" name="q" class="form-control" placeholder="寻找......" _mstplaceholder="164775" _msthash="653">
      <span class="input-group-btn">
        <button class="btn btn-default" type="submit" _msttexthash="10084152" _msthash="654">走！</button>
      </span>

    </div>
  </form>
</div>

<div class="panel panel-default">
  <!-- Default panel contents -->
  <div class="panel-heading">
    <span class="glyphicon glyphicon-th-list" aria-hidden="true"></span>
    靓号列表

  </div>

  <!-- Table -->
  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>号码</th>
        <th>价格</th>
        <th>级别</th>
        <th>状态</th>
      </tr>
    </thead>
    <tbody>
      {% for obj in queryset %}
      <tr>
        <th scope="row">{{obj.id}}</th>
        <td>{{obj.mobile}}</td>
        <td>{{obj.price}}</td>
        <td>{{obj.get_level_display}}</td>
        <!-- 特殊的两个，要用一些手段 -->
        <td>{{obj.get_status_display}}</td>
        <td>
          <a class="btn btn-primary btn-xs" href="/pretty/{{obj.id}}/edit">编辑</a>
          <a class="btn btn-danger btn-xs" href="/pretty/{{obj.id}}/delete">删除</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
<nav aria-label="Page navigation">
  <ul class="pagination">
    <li>
      <a href="#" aria-label="Previous">
        <span aria-hidden="true">&laquo;</span>
      </a>
    </li>
      {{page_string}}
    <li>
      <a href="#" aria-label="Next">
        <span aria-hidden="true">&raquo;</span>
      </a>
    </li>
  </ul>
</nav>
{% endblock %}
